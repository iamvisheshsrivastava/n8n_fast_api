services:
  fastapi:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    env_file:
      - .env

  streamlit:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8501:8501"
    environment:
      - FASTAPI_BASE_URL=http://fastapi:8000
    depends_on:
      - fastapi

  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=yourpassword
      - N8N_SECURE_COOKIE=false
      - DB_SQLITE_POOL_SIZE=5
      - N8N_RUNNERS_ENABLED=true
      - EXPRESS_TRUST_PROXY=true
      - WEBHOOK_URL=${PUBLIC_BASE_URL}

  homepage:
    image: nginx:alpine
    volumes:
      - ./infra/nginx:/usr/share/nginx/html
      - ./infra/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "8090:80"
    environment:
      - INDEX_FILE=index.production.html
    depends_on:
      - fastapi
      - streamlit
      - n8n
